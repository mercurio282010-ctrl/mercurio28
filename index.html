<html>
<head>
<title>Tourist Login</title>
</head>
<body style="margin:0; padding:0; background-image:url('https://img.sanishtech.com/u/172bd2d21ba63850f9a13946042c8cf1.jpg'); background-size:cover; background-position:center;">

<div style="background-color:rgba(0,0,0,0.5); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<table border="0" cellpadding="20" cellspacing="0" width="400" bgcolor="white" style="border-radius:15px; box-shadow:0 0 25px black;">
<tr>
  <td align="center" bgcolor="#0077b6" style="border-radius:10px 10px 0 0;">
    <font size="6" face="Arial" color="white"><b>✈ LOGIN ✈</b></font>
  </td>
</tr>

<form action="peta3.html" method="GET">
<tr>
  <td>
    <font face="Arial" size="3" color="black"><b>Username:</b></font><br>
    <input type="text" name="username" size="30" required placeholder="Enter your username" style="padding:8px; width:95%; margin-top:5px;">
  </td>
</tr>

<tr>
  <td>
    <font face="Arial" size="3" color="black"><b>Password:</b></font><br>
    <input type="password" name="password" size="30" required placeholder="Enter your password" style="padding:8px; width:95%; margin-top:5px;">
  </td>
</tr>

<tr>
  <td>
    <input type="checkbox" name="remember"> 
    <font face="Arial" size="2" color="black">Remember Me</font>
    <font face="Arial" size="2" color="black" style="float:right;"><a href="#">Forgot Password?</a></font>
  </td>
</tr>

<tr>
  <td align="center">
    <input type="submit" value="LOGIN" style="background-color:#0077b6; color:white; font-size:18px; font-weight:bold; padding:10px 40px; border:none; border-radius:8px; width:100%; cursor:pointer;">
  </td>
</tr>

<tr>
  <td align="center">
    <font face="Arial" size="2" color="black">New here? <a href="Reservation.html">Create Account</a></font>
  </td>
</tr>
</form>
</table>

</div>
</body>
</html>
